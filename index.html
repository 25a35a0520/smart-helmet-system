        <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Helmet Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* MAIN LAYOUT */
.main {
    display: flex;
    height: 100vh;
}

/* LEFT SIDE */
.left {
    width: 50%;
    padding: 20px;
    overflow-y: auto;
}

/* RIGHT SIDE (SMART HELMET IMAGE) */
.right {
    width: 50%;
    background-image: url("https://images.unsplash.com/photo-1600269452121-4f2416e55c28?q=80&w=1600&auto=format&fit=crop");
    background-size: cover;
    background-position: center;
    filter: brightness(0.7);
}

/* TITLE */
.title {
    text-align: center;
    margin-bottom: 20px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

/* CARD */
.card {
    background: rgba(30,30,30,0.9);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* BUTTON */
button {
    padding: 8px 12px;
    border: none;
    background: green;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

/* MAP */
iframe {
    width: 100%;
    height: 150px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="main">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1 class="title">🚀 Smart Helmet Dashboard</h1>

        <div class="container">

            <div class="card">
                <h3>Helmet Status</h3>
                <p id="helmet-status">Checking...</p>
            </div>

            <div class="card">
                <h3>Alcohol Detection</h3>
                <p id="alcohol-status">Checking...</p>
            </div>

            <div class="card">
                <h3>Accident Detection</h3>
                <p id="accident-status">Checking...</p>
                <button onclick="sendAlert()">🚨 Emergency</button>
            </div>

            <div class="card">
                <h3>Bike Ignition</h3>
                <p id="bike-status">OFF</p>
                <button onclick="toggleBike()">Start / Stop</button>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>📍 Live Location</h3>
                <iframe src="https://www.google.com/maps?q=17.3850,78.4867&z=15&output=embed"></iframe>
            </div>

        </div>
    </div>

    <!-- RIGHT SIDE IMAGE -->
    <div class="right"></div>

</div>

<script>
// STATUS FUNCTION
function setStatus(id, text, isGood) {
    let el = document.getElementById(id);
    el.innerText = text;
    el.style.color = isGood ? "lightgreen" : "red";
}

// AUTO UPDATE
setInterval(() => {

    let helmetOk = Math.random() > 0.5;
    setStatus("helmet-status", helmetOk ? "Worn ✅" : "Not Worn ❌", helmetOk);

    let alcoholOk = Math.random() > 0.7;
    setStatus("alcohol-status", alcoholOk ? "Detected ❌" : "Safe ✅", !alcoholOk);

    let accident = Math.random() > 0.9;
    setStatus("accident-status", accident ? "Accident 🚨" : "Safe", !accident);

}, 3000);

// BIKE CONTROL
let bikeOn = false;
function toggleBike() {
    bikeOn = !bikeOn;
    document.getElementById("bike-status").innerText = bikeOn ? "ON ✅" : "OFF ❌";
}

// ALERT
function sendAlert() {
    alert("🚨 Emergency Alert Sent!");
}
</script>

</body>
</html>
