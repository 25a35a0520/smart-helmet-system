<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Helmet Dashboard</title>

<!-- CSS LINK (VERY IMPORTANT) -->
<link rel="stylesheet" href="styles.css">
<style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
    background-size: cover;
    background-position: center;
    color: white;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Title */
.title {
    text-align: center;
    padding: 15px;
}

/* Grid */
    </style>
</head>

<body>

<h1 class="title">🚀 Smart Helmet Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Helmet Status</h3>
        <p id="helmet-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Alcohol Detection</h3>
        <p id="alcohol-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Accident Detection</h3>
        <p id="accident-status">Checking...</p>
        <button onclick="sendAlert()">🚨 Emergency</button>
    </div>

    <div class="card">
        <h3>Bike Ignition</h3>
        <p id="bike-status">OFF</p>
        <button onclick="toggleBike()">Start / Stop</button>
    </div>

    <div class="card">
        <h3>📍 Live Location</h3>
        <iframe 
src="https://www.google.com/maps?q=17.3850,78.4867&z=15&output=embed"
width="100%" height="250" style="border:0;" allowfullscreen>
        </iframe>
    </div>

</div>

<!-- JS LINK (IMPORTANT) -->
<script src="scripts.js"></script>

</body>
</html>
