<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Helmet Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>🚀 Smart Helmet Dashboard</h1>
    <button onclick="toggleTheme()">🌙 Toggle Mode</button>
</header>

<div class="container">

    <div class="card">
        <h3>Helmet Status</h3>
        <p id="helmet-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Alcohol Detection</h3>
        <p id="alcohol-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Accident Detection</h3>
        <p id="accident-status">Checking...</p>
        <button onclick="sendAlert()">🚨 Emergency</button>
    </div>

    <div class="card">
        <h3>Bike Ignition</h3>
        <p id="bike-status">OFF</p>
        <button onclick="toggleBike()">Start / Stop</button>
    </div>

    <div class="card">
        <h3>📍 Live Location</h3>
        <iframe 
        src="https://maps.google.com/maps?q=17.3850,78.4867&z=15&output=embed"
        width="100%" height="200"></iframe>
    </div>

</div>

<script src="scripts.js"></script>
</body>
</html>
