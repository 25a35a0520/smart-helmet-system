<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Helmet Dashboard</title>

<!-- CSS LINK (VERY IMPORTANT) -->
<link rel="stylesheet" href="styles.css">
<style>
    body{
        background:black;
        color:white;
    }
    
</style> 
</head>

<body>

<h1 class="title">🚀 Smart Helmet Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Helmet Status</h3>
        <p id="helmet-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Alcohol Detection</h3>
        <p id="alcohol-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Accident Detection</h3>
        <p id="accident-status">Checking...</p>
        <button onclick="sendAlert()">🚨 Emergency</button>
    </div>

    <div class="card">
        <h3>Bike Ignition</h3>
        <p id="bike-status">OFF</p>
        <button onclick="toggleBike()">Start / Stop</button>
    </div>

    <div class="card">
        <h3>📍 Live Location</h3>
        <iframe 
        src="https://maps.google.com/maps?q=17.3850,78.4867&z=15&output=embed">
        </iframe>
    </div>

</div>

<!-- JS LINK (IMPORTANT) -->
<script src="scripts.js"></script>

</body>
</html>
