<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Helmet Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;

    background-image: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: white;
}

/* Overlay for readability */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Title */
.title {
    text-align: center;
    padding: 15px;
}

/* Grid Layout */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Cards */
.card {
    background: #1f1f1f;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Buttons */
button {
    padding: 8px 12px;
    border: none;
    background: green;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

/* Map */
iframe {
    width: 100%;
    height: 200px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1 class="title">🚀 Smart Helmet Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Helmet Status</h3>
        <p id="helmet-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Alcohol Detection</h3>
        <p id="alcohol-status">Checking...</p>
    </div>

    <div class="card">
        <h3>Accident Detection</h3>
        <p id="accident-status">Checking...</p>
        <button onclick="sendAlert()">🚨 Emergency</button>
    </div>

    <div class="card">
        <h3>Bike Ignition</h3>
        <p id="bike-status">OFF</p>
        <button onclick="toggleBike()">Start / Stop</button>
    </div>

    <div class="card">
        <h3>📍 Live Location</h3>
        <iframe 
        src="https://www.google.com/maps?q=17.3850,78.4867&z=15&output=embed"
        allowfullscreen>
        </iframe>
    </div>

</div>

<script>
// Status function
function setStatus(id, text, isGood) {
    let el = document.getElementById(id);
    el.innerText = text;
    el.style.color = isGood ? "lightgreen" : "red";
}

// Auto update
setInterval(() => {

    let helmetOk = Math.random() > 0.5;
    setStatus("helmet-status", helmetOk ? "Worn ✅" : "Not Worn ❌", helmetOk);

    let alcoholOk = Math.random() > 0.7;
    setStatus("alcohol-status", alcoholOk ? "Detected ❌" : "Safe ✅", !alcoholOk);

    let accident = Math.random() > 0.9;
    setStatus("accident-status", accident ? "Accident 🚨" : "Safe", !accident);

}, 3000);

// Bike control
let bikeOn = false;
function toggleBike() {
    bikeOn = !bikeOn;
    document.getElementById("bike-status").innerText = bikeOn ? "ON ✅" : "OFF ❌";
}

// Emergency alert
function sendAlert() {
    alert("🚨 Emergency Alert Sent!");
}
</script>

</body>
</html>
